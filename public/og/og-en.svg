<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowCoral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBDADA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FBDADA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C0D3DA" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C0D3DA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="#FBF8F3"/>
  <!-- soft brand glows -->
  <circle cx="1050" cy="90" r="420" fill="url(#glowCoral)"/>
  <circle cx="120" cy="600" r="420" fill="url(#glowTeal)"/>
  <!-- subtle frame -->
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="none" stroke="#1A1A1A" stroke-opacity="0.08" stroke-width="2"/>

  <!-- heart (support) -->
  <g transform="translate(540,96) scale(1.20)">
    <path d="M50,84 C50,84 12,56 12,32 C12,18 24,12 34,16 C42,19 47,27 50,34 C53,27 58,19 66,16 C76,12 88,18 88,32 C88,56 50,84 50,84 Z" fill="#E85D5D"/>
  </g>

  <!-- wordmark -->
  <text x="600" y="372" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="150" letter-spacing="-3" text-anchor="middle">
    <tspan fill="#E85D5D">p</tspan><tspan fill="#1A1A1A">inka</tspan><tspan fill="#E85D5D">.</tspan>
  </text>

  <!-- tagline -->
  <text x="600" y="462" font-family="Helvetica, Arial, sans-serif" font-size="46" fill="#3A3A3A" text-anchor="middle">Support campaigns with a single scan</text>

  <!-- rail -->
  <text x="600" y="566" font-family="Helvetica, Arial, sans-serif" font-size="27" fill="#6B6B6B" letter-spacing="0.5" text-anchor="middle">SEPA Instant &#183; Monerium EURe &#183; Gnosis</text>
